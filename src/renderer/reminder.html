<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Reminder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .time {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .content {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px 15px;
      border-radius: 8px;
      font-size: 14px;
      flex: 1;
      min-height: 0;
      word-break: break-word;
      line-height: 1.6;
      backdrop-filter: blur(10px);
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* When image is present, constrain note height so thumbnail can fill remaining space */
    body.has-image .content {
      flex: 0 0 auto;
      max-height: 110px;
    }

    .thumbnail-container {
      margin-top: 12px;
      flex: 1;
      min-height: 0;
      display: none;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
    }

    .thumbnail-container.visible {
      display: flex;
    }

    .thumbnail-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 6px;
      display: block;
    }

    .footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 14px;
      flex-shrink: 0;
    }

    button {
      padding: 8px 15px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    button:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .btn-primary {
      background: rgba(255, 255, 255, 0.9);
      color: #667eea;
      border: none;
      font-weight: bold;
    }

    .btn-primary:hover {
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="header">⏰ Task Reminder</div>
  <div class="time" id="dueTime">Due: Loading...</div>
  <div class="content" id="content">Loading...</div>
  <div class="thumbnail-container" id="thumbnailContainer">
    <img id="thumbnailImg" src="" alt="Screenshot" />
  </div>
  <div class="footer">
    <button id="snoozeBtn">Snooze 10m</button>
    <button id="doneBtn">Mark Done</button>
    <button class="btn-primary" id="openBtn">Open Record</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    let currentRecord = null;

    // Receive reminder data from main process
    ipcRenderer.on('reminder-data', (event, data) => {
      currentRecord = data;
      document.getElementById('dueTime').textContent = `Due: ${data.dueTime}`;
      document.getElementById('content').textContent = data.summary;

      // Show thumbnail if image path is provided
      const container = document.getElementById('thumbnailContainer');
      const img = document.getElementById('thumbnailImg');
      if (data.imagePath) {
        img.src = `file:///${data.imagePath.replace(/\\/g, '/')}`;
        img.onerror = () => {
          document.body.classList.remove('has-image');
          container.classList.remove('visible');
        };
        img.onload = () => {
          document.body.classList.add('has-image');
          container.classList.add('visible');
        };
      } else {
        document.body.classList.remove('has-image');
        container.classList.remove('visible');
      }
    });

    // Button handlers
    document.getElementById('snoozeBtn').addEventListener('click', () => {
      if (currentRecord) {
        ipcRenderer.send('reminder-action', { action: 'snooze', path: currentRecord.metadataPath });
        window.close();
      }
    });

    document.getElementById('doneBtn').addEventListener('click', () => {
      if (currentRecord) {
        ipcRenderer.send('reminder-action', { action: 'done', path: currentRecord.metadataPath });
        window.close();
      }
    });

    document.getElementById('openBtn').addEventListener('click', () => {
      if (currentRecord) {
        ipcRenderer.send('reminder-action', { action: 'open', path: currentRecord.metadataPath });
        window.close();
      }
    });
  </script>
</body>
</html>
